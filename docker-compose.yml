services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
      - "8088:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      CMS_API_INTERNAL_URL: http://backend:8000/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: "DesignStudio CMS"
      APP_ENV: local
      APP_KEY: "base64:ZhGpD5FuNyP8hZRxQpHdx3p7YvfxzXGX6iN5D0GjEl0="
      APP_DEBUG: "true"
      APP_URL: http://localhost:8088
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: designstudio
      DB_USERNAME: designstudio
      DB_PASSWORD: designstudio
      ADMIN_NAME: Admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: password
      MOONSHINE_TITLE: "DesignStudio CMS"
      MOONSHINE_ROUTE_PREFIX: admin
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/config:/var/www/html/config
      - ./backend/resources:/var/www/html/resources
      - ./backend/database:/var/www/html/database
      - ./backend/lang:/var/www/html/lang
      - backend_storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: designstudio
      MARIADB_USER: designstudio
      MARIADB_PASSWORD: designstudio
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  backend_storage:
